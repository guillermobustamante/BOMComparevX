  <text x="112" y="100" fill="#5C7392" font-family="Segoe UI, Arial, sans-serif" font-size="22" letter-spacing="5">MISSION CONTROL</text>
  <text x="112" y="152" fill="#10213B" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="700">Taxonomy Editor</text>
  <text x="112" y="188" fill="#607291" font-family="Segoe UI, Arial, sans-serif" font-size="24">A calmer, more guided way for administrators to govern one change type.</text>

