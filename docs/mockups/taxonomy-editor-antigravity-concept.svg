  <text x="1360" y="584" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Three decisions.</text>
  <text x="1360" y="620" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">No clutter.</text>

