  <rect x="1350" y="176" width="116" height="58" rx="18" fill="#5B8FFF"/>
  <text x="1390" y="212" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Save</text>

