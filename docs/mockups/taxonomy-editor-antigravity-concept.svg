  <text x="136" y="272" fill="#6B809D" font-family="Segoe UI, Arial, sans-serif" font-size="18" letter-spacing="3">CHANGE TYPE</text>
  <text x="136" y="326" fill="#10213B" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700">Product design / form-fit-function change</text>
  <text x="136" y="366" fill="#5F7392" font-family="Segoe UI, Arial, sans-serif" font-size="22">Geometry, tolerance, interface, performance, durability, or compatibility changes to the product definition.</text>

