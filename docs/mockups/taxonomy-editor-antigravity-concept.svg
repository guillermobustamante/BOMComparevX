  <text x="1064" y="852" fill="#8A651B" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">OEM SQE  x    Customer Eng  x</text>

  <text x="136" y="908" fill="#607291" font-family="Segoe UI, Arial, sans-serif" font-size="18">Concept direction: fewer input boxes, stronger hierarchy, guided sections, sticky actions, and visual grouping for administrators.</text>
