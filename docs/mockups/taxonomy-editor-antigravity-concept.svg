      <stop stop-color="#FDFEFF"/>
      <stop offset="0.42" stop-color="#EEF5FF"/>
      <stop offset="1" stop-color="#E5F0FF"/>
    </linearGradient>
    <linearGradient id="hero" x1="100" y1="98" x2="1320" y2="362" gradientUnits="userSpaceOnUse">
