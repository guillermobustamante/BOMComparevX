  <text x="410" y="736" fill="#8A6B1E" font-family="Segoe UI, Arial, sans-serif" font-size="16" letter-spacing="2">COMPLIANCE</text>
  <text x="410" y="776" fill="#5E4310" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">IATF 16949 / PPAP</text>
  <text x="410" y="804" fill="#8C6A22" font-family="Segoe UI, Arial, sans-serif" font-size="18">Clause 8.3.6 managed evidence</text>

