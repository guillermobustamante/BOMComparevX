  <text x="887" y="723" fill="#204D99" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">Reference / Position</text>
  <rect x="1048" y="700" width="126" height="36" rx="18" fill="#EEF4FF" stroke="#C3D7FB"/>
  <text x="1082" y="723" fill="#204D99" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">Variant</text>
  <rect x="1184" y="700" width="82" height="36" rx="18" fill="#F7FAFE" stroke="#D8E4F4"/>
  <text x="1213" y="723" fill="#5F7392" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">+ Add</text>

  <rect x="700" y="712" width="596" height="140" rx="28" fill="#FFFFFF" stroke="#D8E4F4"/>
  <text x="736" y="758" fill="#6A7F9B" font-family="Segoe UI, Arial, sans-serif" font-size="18" letter-spacing="3">APPROVALS</text>
  <text x="736" y="808" fill="#10213B" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Internal and external roles stay visible in one split view</text>

  <rect x="96" y="878" width="1200" height="30" rx="15" fill="#E8F0FC"/>
  <rect x="96" y="878" width="840" height="30" rx="15" fill="#7BA7FF"/>
  <text x="112" y="899" fill="#15469D" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Guided completion: 70%</text>

  <rect x="736" y="824" width="286" height="44" rx="22" fill="#EDF9F0" stroke="#B8DDBF"/>
