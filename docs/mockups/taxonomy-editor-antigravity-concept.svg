  <text x="156" y="736" fill="#6B7E99" font-family="Segoe UI, Arial, sans-serif" font-size="16" letter-spacing="2">CONTROL PATH</text>
  <text x="156" y="776" fill="#153058" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">ECR / ECO</text>
  <text x="156" y="804" fill="#607291" font-family="Segoe UI, Arial, sans-serif" font-size="18">DV/PV evidence + PPAP if triggered</text>

